<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Agent Debug</title>
   <style>
    :root {
        --bg-gradient-start: #0f0c29;
        --bg-gradient-mid: #302b63;
        --bg-gradient-end: #24243e;
        --glass-bg: rgba(255, 255, 255, 0.06);
        --glass-border: rgba(255, 255, 255, 0.12);
        --glass-bg-hover: rgba(255, 255, 255, 0.1);
        --text-primary: #f5f5fa;
        --text-secondary: rgba(245, 245, 250, 0.65);
        --accent: #7c5cff;
        --accent-glow: rgba(124, 92, 255, 0.4);
        --user-color: #5eb1ff;
        --assistant-color: #5eff9b;
        --tool-call-color: #ffd45e;
        --tool-result-color: #ff8c5e;
        --error-color: #ff5e7e;
        --update-color: #a0a0b8;
    }

    * {
        box-sizing: border-box;
    }

    @keyframes gradient-shift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    @keyframes fade-in {
        from {
            opacity: 0;
            transform: translateY(8px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
        50% { box-shadow: 0 0 40px var(--accent-glow); }
    }

    body {
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1.5rem;
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
        background: linear-gradient(-45deg, var(--bg-gradient-start), var(--bg-gradient-mid), var(--bg-gradient-end), #1a1a2e);
        background-size: 400% 400%;
        animation: gradient-shift 20s ease infinite;
        color: var(--text-primary);
        min-height: 100vh;
        line-height: 1.5;
    }

    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
            radial-gradient(circle at 20% 30%, rgba(124, 92, 255, 0.15), transparent 50%),
            radial-gradient(circle at 80% 70%, rgba(94, 177, 255, 0.12), transparent 50%);
        pointer-events: none;
        z-index: -1;
    }

    h2 {
        font-size: 2.25rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        margin: 1.5rem 0;
        background: linear-gradient(135deg, #fff 0%, #a78bff 50%, #5eb1ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
    }

    h2::after {
        content: '';
        display: block;
        width: 60px;
        height: 3px;
        margin: 0.75rem auto 0;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        border-radius: 2px;
    }

    #log {
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        padding: 1rem;
        height: 62vh;
        overflow-y: auto;
        margin-bottom: 1rem;
        box-shadow:
            0 8px 32px rgba(0, 0, 0, 0.3),
            inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    #log::-webkit-scrollbar {
        width: 8px;
    }

    #log::-webkit-scrollbar-track {
        background: transparent;
    }

    #log::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 4px;
    }

    #log::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.25);
    }

    .entry {
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 0.75rem 0.9rem;
        margin-bottom: 0.6rem;
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        animation: fade-in 0.3s ease-out;
        position: relative;
        overflow: hidden;
        transition: transform 0.15s ease, background 0.15s ease;
    }

    .entry::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--update-color);
    }

    .entry:hover {
        background: var(--glass-bg-hover);
        transform: translateX(2px);
    }

    .entry.user {
        background: linear-gradient(135deg, rgba(94, 177, 255, 0.12), rgba(94, 177, 255, 0.04));
        border-color: rgba(94, 177, 255, 0.25);
    }
    .entry.user::before { background: var(--user-color); box-shadow: 0 0 12px var(--user-color); }

    .entry.assistant {
        background: linear-gradient(135deg, rgba(94, 255, 155, 0.12), rgba(94, 255, 155, 0.04));
        border-color: rgba(94, 255, 155, 0.25);
    }
    .entry.assistant::before { background: var(--assistant-color); box-shadow: 0 0 12px var(--assistant-color); }

    .entry.tool_call {
        background: linear-gradient(135deg, rgba(255, 212, 94, 0.12), rgba(255, 212, 94, 0.04));
        border-color: rgba(255, 212, 94, 0.25);
        font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
        font-size: 0.88em;
    }
    .entry.tool_call::before { background: var(--tool-call-color); box-shadow: 0 0 12px var(--tool-call-color); }

    .entry.tool_result {
        background: linear-gradient(135deg, rgba(255, 140, 94, 0.12), rgba(255, 140, 94, 0.04));
        border-color: rgba(255, 140, 94, 0.25);
        font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
        font-size: 0.88em;
    }
    .entry.tool_result::before { background: var(--tool-result-color); box-shadow: 0 0 12px var(--tool-result-color); }

    .entry.update,
    .entry.done {
        background: rgba(255, 255, 255, 0.03);
        border-color: rgba(255, 255, 255, 0.08);
        color: var(--text-secondary);
        font-size: 0.85em;
    }

    .entry.error {
        background: linear-gradient(135deg, rgba(255, 94, 126, 0.15), rgba(255, 94, 126, 0.05));
        border-color: rgba(255, 94, 126, 0.3);
    }
    .entry.error::before { background: var(--error-color); box-shadow: 0 0 12px var(--error-color); }

    .label {
        font-weight: 600;
        font-size: 0.7em;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-secondary);
        margin-bottom: 0.35rem;
        display: inline-block;
    }

    .body {
        white-space: pre-wrap;
        word-wrap: break-word;
        color: var(--text-primary);
        font-size: 0.95em;
    }

    #form {
        display: flex;
        gap: 0.6rem;
        padding: 0.4rem;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        box-shadow:
            0 8px 32px rgba(0, 0, 0, 0.3),
            inset 0 1px 0 rgba(255, 255, 255, 0.08);
        transition: box-shadow 0.3s ease;
    }

    #form:focus-within {
        box-shadow:
            0 8px 32px rgba(0, 0, 0, 0.3),
            inset 0 1px 0 rgba(255, 255, 255, 0.08),
            0 0 0 2px var(--accent-glow);
    }

    #input {
        flex: 1;
        padding: 0.75rem 1rem;
        border: none;
        border-radius: 10px;
        background: transparent;
        color: var(--text-primary);
        font-size: 1rem;
        font-family: inherit;
        outline: none;
    }

    #input::placeholder {
        color: var(--text-secondary);
    }

    button {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent) 0%, #5e8cff 100%);
        color: white;
        font-weight: 600;
        font-size: 0.95rem;
        font-family: inherit;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        box-shadow: 0 4px 16px var(--accent-glow);
        letter-spacing: 0.02em;
    }

    button:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 6px 24px var(--accent-glow);
    }

    button:active:not(:disabled) {
        transform: translateY(0);
    }

    button:disabled {
        opacity: 0.5;
        cursor: default;
        animation: pulse-glow 1.5s ease-in-out infinite;
    }
</style>
</head>

<body>

    <h2>Agent Debug</h2>

    <div id="log"></div>

    <form id="form">
        <input id="input" type="text" placeholder="Say something..." autocomplete="off" required>
        <button type="submit" id="send">Send</button>
    </form>

    <script>
        const SESSION_ID = crypto.randomUUID();
        const log = document.getElementById("log");
        const form = document.getElementById("form");
        const input = document.getElementById("input");
        const send = document.getElementById("send");

        /**
         * @type Promise<Response>[]
         */
        const stream_queue = [];

        function addEntry(cls, label, text) {
            const div = document.createElement("div");
            div.className = "entry " + cls;
            const l = document.createElement("div");
            l.className = "label";
            l.textContent = label;
            const b = document.createElement("div");
            b.className = "body";
            b.textContent = text;
            div.appendChild(l);
            div.appendChild(b);
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            return b;  // return body element so we can append to it
        }

        // SSE parser over fetch streaming
        async function* parseSSE(response) {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buf = "";
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buf += decoder.decode(value, { stream: true });

                // Normalize CRLF to LF so we only have to handle one case
                buf = buf.replace(/\r\n/g, "\n");

                let idx;
                while ((idx = buf.indexOf("\n\n")) !== -1) {
                    const raw = buf.slice(0, idx);
                    buf = buf.slice(idx + 2);
                    let event = null;
                    const dataLines = [];
                    for (const line of raw.split("\n")) {
                        if (line.startsWith("event:")) event = line.slice(6).trim();
                        else if (line.startsWith("data:")) dataLines.push(line.slice(5).trim());
                    }
                    if (event && dataLines.length) {
                        yield { event, data: JSON.parse(dataLines.join("\n")) };
                    }
                }
            }
        }


        /**
         * @param {Promise<Response>} response
         */
        async function handle_stream(response_promise){
            let assistantBody = null;
            try {
                const resp = await response_promise;

                if (!resp.ok) throw new Error("HTTP " + resp.status);

                for await (const { event, data } of parseSSE(resp)) {
                    if (event === "token") {
                        if (!assistantBody) assistantBody = addEntry("assistant", "assistant", "");
                        assistantBody.textContent += data.text;
                        log.scrollTop = log.scrollHeight;
                    } else {
                        assistantBody = null;  // next token starts a new bubble
                        if (event === "tool_call") {
                            addEntry("tool_call", "tool call",
                                `${data.name || "(empty)"}(${JSON.stringify(data.args)})`);
                        } else if (event === "tool_result") {
                            addEntry("tool_result", "tool result → " + data.name, data.content);
                        } else if (event === "update") {
                            addEntry("update", "update",
                                `${data.nodes.join(", ")}  ${data.namespace.length ? "[" + data.namespace.join("/") + "]" : ""}`);
                        } else if (event === "custom") {
                            addEntry("update", "custom", JSON.stringify(data));
                        } else if (event === "error") {
                            addEntry("error", "error", data.message);
                        } else if (event === "done") {
                            addEntry("done", "done", "");
                        } else if (event === "approval_required") {
                            addEntry("approval_request","approval request", JSON.stringify(data));
                            const { tool, args } = data;          // not data.interrupt
                            const ok = confirm(`Approve ${tool}(${JSON.stringify(args)})?`);
                            addEntry(
                                ok?"approval_response_positive":"approval_response_negative",
                                "approval",
                                ok?"APPROVED":"NOT APPROVED"
                            );

                            // POST to /resume with session_id and approved
                            stream_queue.push(fetch("/resume", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ session_id: SESSION_ID, approved: ok }),
                            }));
                        }else{
                            addEntry("unknown", "event", JSON.stringify(data));
                        }
                    }
                }
            } catch (err) {
                addEntry("error", "error", String(err));
            }
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const message = input.value.trim();
            if (!message) return;
            input.value = "";
            send.disabled = true;

            addEntry("user", "user", message);

            // The current assistant "bubble" — created lazily on first token,
            // reset whenever a non-token event arrives so the next token batch
            // starts a fresh entry. This keeps streamed text grouped per turn.
            
            stream_queue.push(fetch("/stream", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message, session_id: SESSION_ID }),
            }));
            try {
                while(stream_queue.length>0){
                    const next = stream_queue.shift();
                    if (!next) break;
                    await handle_stream(next);
                }
            } catch (err) {
                addEntry("error", "error", String(err));
            } finally {
                send.disabled = false;
                input.focus();
            }
        });

        input.focus();
    </script>
</body>

</html>
